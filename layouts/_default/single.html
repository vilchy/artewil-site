https://github.com/adityatelange/hugo-PaperMod/blob/master/layouts/_default/single.html

<article class="post-single {{ .Type }}">
  <header class="post-header">
    <h1 class="post-title">
      {{ .Title }}
    </h1>
    {{- if not (.Param "hideMeta") }}
    <div class="post-meta">
      {{- partial "post_meta.html" . -}}
      {{- partial "translation_list.html" . -}}
    </div>
    {{- end }}
  </header>

  {{- if .Content }}
  <div class="post-content">
    {{- if not (.Param "disableAnchoredHeadings") }}
    {{- partial "anchored_headings.html" .Content -}}
    {{- else }}{{ .Content }}{{ end }}
  </div>
  <svg style="position: absolute; width: 0; height: 0;" width="0" height="0">
      <symbol id="icon-external-link" viewBox="0 0 24 24"
              fill="none" shape-rendering="geometricPrecision" stroke="currentColor" stroke-linecap="round"
              stroke-linejoin="round" stroke-width="2.5">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"></path>
        <path d="M15 3h6v6"></path>
        <path d="M10 14L21 3"></path>
      </symbol>
  </svg>
  {{- end }}

  {{- if .Param "CCLicense" }}
  <footer class="cc-footer">
      <p>
        <span property="dct:title" class="title">
          {{ .Title }}
        </span>
        {{ T "areLicensedUnder" }}
        <a href="http://creativecommons.org/licenses/by-sa/4.0/deed.{{ site.Language.Lang }}"
           target="_blank"
           rel="license noopener noreferrer">
          <span class="text">{{ T "CCBYSA" }}</span>{{- /**/ -}}
          <span class="icons">
          {{- range slice "cc" "by" "sa" -}}
            <img src="https://mirrors.creativecommons.org/presskit/icons/{{ . }}.svg">
          {{- end -}}
          </span>
        </a>
      </p>
  </footer>
  {{- end }}
</article>

{{- end }}{{/* end main */}}

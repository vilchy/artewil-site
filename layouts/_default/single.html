<article class="post-single {{ .Type }}">
  <header class="post-header">
    <h1 class="post-title">
      {{ .Title }}
    </h1>
  </header>

  {{- if .Content }}
  <div class="post-content">
    {{- if not (.Param "disableAnchoredHeadings") }}
    {{- partial "anchored_headings.html" .Content -}}
    {{- else }}{{ .Content }}{{ end }}
  </div>
  {{- end }}
</article>

{{- end }}{{/* end main */}}

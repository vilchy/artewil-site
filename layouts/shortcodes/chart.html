{{- $data_id := .Get "data_id" -}}
{{- $canvas_id := printf "chart-%s" $data_id | anchorize -}}
{{- $data := index site.Data (split $data_id "/") -}}
<canvas id="{{ $canvas_id }}"
        class="chart"
        data-lang="{{ site.Language.Lang }}"
        data-chart-data="{{ $data | jsonify }}"
        data-chart-type="{{ .Get "type" }}"
        data-chart-x-scale="{{ .Get "xscale" }}"
        data-chart-y-scale="{{ .Get "yscale" }}">
</canvas>

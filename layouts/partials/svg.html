{{- $icon_name := ( trim .name " " | lower ) -}}
{{- $icon_path := printf "layouts/partials/icons/%s.html" $icon_name -}}
<svg xmlns="http://www.w3.org/2000/svg"
  {{ if .hidden }}
    style="position: absolute; width: 0; height: 0;" width="0" height="0"
  {{ end }}
>
{{ readFile $icon_path | safeHTML }}
{{- if not .hidden -}}
<use xlink:href="#icon-{{- $icon_name -}}"></use>
{{- end -}}
</svg>

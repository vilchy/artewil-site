{{- if not (.Param "hideFooter") -}}
<footer class="footer">
    {{- if site.Copyright -}}
    <span>{{ site.Copyright | markdownify }}</span>
    {{- else -}}
    <span>&copy; {{ now.Year }} <a href="{{ "" | absLangURL }}">{{ site.Title }}</a>.</span>
    {{ end -}}
    <span>
        {{- T "poweredBy" }}
        <a href="https://gohugo.io/"
           {{ if ne site.Language.Lang "en" }}lang="en" hreflang="en"{{ end }}>Hugo</a>.
        {{ T "Theme" }}:
        <a href="https://github.com/adityatelange/hugo-PaperMod/"
           {{ if ne site.Language.Lang "en" }}lang="en" hreflang="en"{{ end }}>PaperMod</a>.
    </span>
</footer>
{{- end -}}

{{- if (not site.Params.disableScrollToTop) }}
<a href="#top" aria-label="{{ T "goToTop" }}" class="top-link" id="top-link">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 6" fill="currentColor">
        <path d="M12 6H0l6-6z" />
    </svg>
</a>
{{- end }}

{{- partial "extend_footer.html" . }}

{{- if (not site.Params.disableScrollToTop) }}
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
{{- end }}

{{- if (not site.Params.disableThemeToggle) }}
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        if (document.body.className.includes("dark")) {
            document.body.classList.remove('dark');
            localStorage.setItem("pref-theme", 'light');
        } else {
            document.body.classList.add('dark');
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
{{- end }}

baseURL: "/"
title: ArteWil
copyright: © 2023 Artur Wilniewczyc.
theme: PaperMod

enableRobotsTXT: true

disableKinds:
  - taxonomy
  - term

minify:
  disableXML: true
  minifyOutput: true

defaultContentLanguageInSubdir: true
languages:
  en:
    languageName: English
    weight: 1
    menu:
      main:
        - name: Software
          url: software/
          weight: 5
        - name: Music
          url: music/
  pl:
    languageName: Polski
    weight: 2
    menu:
      main:
        - name: Oprogramowanie
          url: oprogramowanie/
          weight: 5
        - name: Muzyka
          url: muzyka/
  de:
    languageName: Deutsch
    weight: 3
    menu:
      main:
        - name: Software
          url: software/
          weight: 5
        - name: Musik
          url: musik/

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false

params:
  env: production
  title: ArteWil
  keywords: [Portfolio]
  author: Artur Wilniewczyc
  images: ["/logo.png"]
  DateFormat: "January 2, 2006"

  assets:
    disableFingerprinting: false
